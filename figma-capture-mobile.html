<!DOCTYPE html>
<!--
  ═══ Mobil → Figma (NEM iframe – ez volt az „üres” Figma oka) ═══

  A Figma HTML→Design gyakran nem viszi át az iframe-ben lévő index.html-t → üres / csíkos frame.
  Megoldás: átirányítás az index.html-re ?figmaViewportMobile=1 + ugyanaz a #figmacapture=… hash.
  Az index.html fejléce ilyenkor 390px-re szűkít + betölti a capture scriptet, ha van figmacapture a hashben.

  Figma fájl: https://www.figma.com/design/7ZfmUiQvU3tALzeFXEJY76

  1) Szerver (a PORT szám legyen ugyanaz mindenhol, pl. 8077 vagy 8877):
       npx http-server . -p 8077 -a 127.0.0.1

  2a) AJÁNLOTT – egyből az index (másold be a böngészőbe, egy sor):

  http://127.0.0.1:8077/index.html?figmaViewportMobile=1#figmacapture=e2c29d33-ec37-4ecd-b09e-2fd5eedbc560&figmaendpoint=https%3A%2F%2Fmcp.figma.com%2Fmcp%2Fcapture%2Fe2c29d33-ec37-4ecd-b09e-2fd5eedbc560%2Fsubmit&figmadelay=25000

  2b) Vagy nyisd ezt a fájlt ugyanazzal a hash-cel – átirányít a fenti index URL-re:
       http://127.0.0.1:8077/figma-capture-mobile.html#figmacapture=e2c29d33-ec37-4ecd-b09e-2fd5eedbc560&figmaendpoint=https%3A%2F%2Fmcp.figma.com%2Fmcp%2Fcapture%2Fe2c29d33-ec37-4ecd-b09e-2fd5eedbc560%2Fsubmit&figmadelay=25000

  3) Várj a figmadelay idejéig (25 mp). A böngészőben a lapnak tele kell töltenie – nem iframe.

  Új captureId-hez: Figma MCP → generate_figma_design → existingFile → fileKey: 7ZfmUiQvU3tALzeFXEJY76,
  majd cseréld a hashben a figmacapture=… és az endpoint …/capture/…/submit részekben az ID-t.
-->
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <title>Figma mobil – átirányítás</title>
  <script>
    (function () {
      var h = window.location.hash || '';
      var base = window.location.pathname.replace(/[^/]+$/, '');
      if (base === '/') base = '';
      window.location.replace(window.location.origin + base + 'index.html?figmaViewportMobile=1' + h);
    })();
  </script>
</head>
<body style="font-family: system-ui, sans-serif; padding: 1.5rem; background: #111; color: #ccc;">
  <p>Átirányítás az <strong>index.html?figmaViewportMobile=1</strong> címre…</p>
  <p><a id="manual" href="#" style="color: #d4af37;">Kattints ide, ha nem történik automatikusan</a></p>
  <script>
    var h = window.location.hash || '';
    var a = document.getElementById('manual');
    var u = 'index.html?figmaViewportMobile=1' + h;
    a.href = u;
  </script>
</body>
</html>
