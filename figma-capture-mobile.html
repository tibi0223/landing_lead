<!DOCTYPE html>
<!--
  ═══ Mobil nézet → Figma (ugyanabba a fájlba) ═══

  Cél: a landing oldal ~390px szélességű nézete kerüljön a meglévő Figma fájlba,
  ne egy széles (pl. 1900px) „üres” keretbe szorítva.

  Figma fájl: https://www.figma.com/design/7ZfmUiQvU3tALzeFXEJY76

  Lépések (mindig ebben a sorrendben):

  1) Nyisd a projekt mappáját terminálban, indíts helyi szervert (8877-es port):
       npx http-server . -p 8877 -a 127.0.0.1

  2) Másold be a böngésző címsorába EZT az egy sort (hash is kell — ez indítja a Figma capture-t):

  http://127.0.0.1:8877/figma-capture-mobile.html#figmacapture=d4d64728-dd80-423b-bc41-987863cd0975&figmaendpoint=https%3A%2F%2Fmcp.figma.com%2Fmcp%2Fcapture%2Fd4d64728-dd80-423b-bc41-987863cd0975%2Fsubmit&figmadelay=20000

  3) Várj: a figmadelay=20000 = 20 mp, hogy az iframe betöltse az index.html-t. Ne zárd be a lapot, amíg a capture fut.

  4) A Figma fájlban megjelenik egy ÚJ frame (rétegek panel). A régi, rossz „mobile” keretet törölheted kézzel.

  Fontos: minden capture ID egyszer használható. Ha ez az URL már nem működik, Cursor / Figma MCP:
  generate_figma_design → outputMode: existingFile → fileKey: 7ZfmUiQvU3tALzeFXEJY76
  → új captureId → cseréld ki a fenti URL-ben a figmacapture= és a .../capture/... részekben.
-->
<html lang="hu" style="width:390px;max-width:390px;margin:0;padding:0;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1, maximum-scale=1" />
  <title>Figma – mobile viewport</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    html {
      width: 390px !important;
      max-width: 390px !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow-x: hidden;
      background: #080808;
    }
    body {
      width: 390px !important;
      max-width: 390px !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow-x: hidden;
      background: #080808;
    }
    iframe {
      display: block;
      width: 390px !important;
      max-width: 390px !important;
      height: 12000px;
      border: 0;
      margin: 0;
      padding: 0;
      vertical-align: top;
    }
  </style>
</head>
<body>
  <iframe src="index.html" title="Landing mobile capture" loading="eager"></iframe>
</body>
</html>
